##### PREFIX ############################################################
# tmux's default prefix is Ctrl-b.
# We change it to Ctrl-a because it's easier to hit.
unbind C-b
set -g prefix C-a

# After making Ctrl-a the prefix, Ctrl-a by itself no longer reaches the app.
# This lets you press Ctrl-a Ctrl-a to send a literal Ctrl-a through to bash,
# zsh, readline, etc. Useful because Ctrl-a normally means "start of line".
bind C-a send-prefix


##### NUMBERING #########################################################
# Start window numbering at 1 instead of 0.
# So your windows are 1, 2, 3... instead of 0, 1, 2...
set -g base-index 1

# Start pane numbering at 1 too, for consistency when pane numbers are shown.
setw -g pane-base-index 1

# If you close window 2 out of 1,2,3 then tmux will renumber so you get 1,2
# instead of 1,3.
set -g renumber-windows on


##### QUALITY OF LIFE ###################################################
# Mouse support:
# - click to select panes
# - scroll with the mouse
# - resize panes with drag in many terminals
set -g mouse on

# Use vi-style keys inside tmux modes such as copy mode and chooser lists.
# This does NOT change your shell. It changes tmux's own modal UI.
setw -g mode-keys vi

# Reduce the delay tmux uses when interpreting Escape-prefixed sequences.
# Helps tmux feel snappier, especially around modal/editor interactions.
set -sg escape-time 10

# Allow longer left status content before truncation.
set -g status-left-length 100


##### STATUS BAR POSITION ###############################################
# Put the status bar at the top instead of the bottom.
set -g status-position top


##### DUSK VICE THEME ###################################################
# Base status bar colors
set -g status-style "bg=#18122b,fg=#d6ccff"

# Left side
set -g status-left-length 100
set -g status-left "#[bg=#7c3aed,fg=#f8f7ff,bold] #S #[bg=#18122b,fg=#d6ccff]"

# Right side
set -g status-right "#[bg=#18122b,fg=#f59e0b] %a %m/%d #[bg=#ea580c,fg=#fff7ed,bold] %I:%M %p "
set -g status-right-length 100

# Window tabs
setw -g window-status-format "#[fg=#8d7bb8,bg=#18122b] #I:#W "
setw -g window-status-current-format "#[fg=#fff7ed,bg=#c2410c,bold] #I:#W "
setw -g window-status-separator ""

# Pane border colors
set -g pane-border-style "fg=#3b2d63"
set -g pane-active-border-style "fg=#f59e0b"

# Message / command line colors
set -g message-style "bg=#7c3aed,fg=#f8f7ff,bold"
set -g message-command-style "bg=#18122b,fg=#fff7ed"

# Optional: highlight current mode
setw -g mode-style "bg=#2e1065,fg=#f59e0b"


##### RELOADING CONFIG ##################################################
# Reload ~/.tmux.conf without restarting tmux.
# Use: prefix + r
bind r source-file ~/.tmux.conf \; display-message "tmux config reloaded"


##### SPLITS ############################################################
# Default tmux split keys are:
#   prefix + "   => split top/bottom
#   prefix + %   => split left/right
#
# Those work, but they are not very mnemonic.
# We add:
#   prefix + s   => horizontal split (stacked, top/bottom)
#   prefix + v   => vertical split (side by side, left/right)
#
# The -c "#{pane_current_path}" part means:
# create the new pane in the same working directory as the current pane.
bind s split-window -v -c "#{pane_current_path}"
bind v split-window -h -c "#{pane_current_path}"

# Keep the original defaults too, but make sure they also preserve cwd.
bind '"' split-window -v -c "#{pane_current_path}"
bind %   split-window -h -c "#{pane_current_path}"


##### PANE MOVEMENT #####################################################
# Default tmux already supports pane movement with:
#   prefix + Left/Right/Up/Down
#
# We keep that behavior and ALSO add Vim-style movement:
#   prefix + h/j/k/l
#
# Under the hood these call:
#   select-pane -L/-D/-U/-R
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R


##### PANE RESIZING #####################################################
# Default tmux has Ctrl-arrow and Alt-arrow bindings in the prefix table
# for resizing panes, but on Windows terminals / WSL setups those can be
# less predictable depending on the terminal and OS.
#
# These are easy to remember:
#   prefix + H/J/K/L
#
# The -r means the key can repeat while held down.
# Resize with arrows instead of Shift+hjkl because home-row mods conflict.
bind -r Left  resize-pane -L 5
bind -r Down  resize-pane -D 5
bind -r Up    resize-pane -U 5
bind -r Right resize-pane -R 5


##### WINDOW HELPERS ####################################################
# New window. This is already a default tmux key, but we include it here
# as part of the "documented starter config".
#   prefix + c
bind c new-window

# Rename current window:
#   prefix + ,
bind , command-prompt -I "#{window_name}" "rename-window '%%'"

# Rename current session:
#   prefix + $
bind $ command-prompt -I "#{session_name}" "rename-session '%%'"

# Interactive window chooser:
#   prefix + w
bind w choose-window

# Interactive tree of sessions/windows/panes:
#   prefix + e
bind e choose-tree


##### PANE / WINDOW CONTROL #############################################
# Kill current pane:
#   prefix + x
bind x kill-pane

# Kill current window:
#   prefix + X
bind X kill-window

# Zoom/unzoom current pane:
#   prefix + z
bind z resize-pane -Z

# Show pane numbers briefly:
#   prefix + q
# This is already a default tmux key, included here as documentation.
bind q display-panes


##### COPY MODE / TMUX UI ###############################################
# Enter copy mode:
#   prefix + [
#
# Paste most recent tmux buffer:
#   prefix + ]
#
# List all key bindings:
#   prefix + ?
#
# Command prompt:
#   prefix + :
#
# Select session interactively:
#   prefix + s
#
# NOTE:
# We reused "s" above for split-window because it is easier for beginners.
# If you want the default session chooser back on "s", remove the split bind
# and use another letter for splitting, like:
#   bind S split-window -v -c "#{pane_current_path}"
#
# Because of that conflict, we map choose-tree to "e" and keep "w" for windows.
#
# We do NOT rebind "[" or "]" here because tmux's defaults are already good.


##### DETACH ############################################################
# Detach current client:
#   prefix + d
# This is a very important default tmux key, and we leave it unchanged.

# Copy selection to the host clipboard on both WSL and Linux
if-shell 'grep -qiE "(microsoft|wsl)" /proc/version 2>/dev/null' \
  'bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "clip.exe"' \
  'bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "xclip -selection clipboard -in"'
